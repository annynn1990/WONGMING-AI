<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 虛擬人 · Demo</title>
<meta name="description" content="網頁右下角的語音 AI 虛擬人助理 — 自建 Demo（Live2D + 瀏覽器語音 + 本機 LLM）" />
<style>
  :root { --ink:#1f3a5f; --teal:#5b54e8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Noto Sans TC",system-ui,sans-serif; color:#243; background:#eef3f6; }
  header { background:linear-gradient(120deg,#1f3a5f,#2f6d8f); color:#fff; padding:54px 24px 60px; text-align:center; }
  header h1 { margin:0 0 10px; font-size:30px; letter-spacing:.5px; }
  header p { margin:0 auto; max-width:560px; opacity:.9; line-height:1.7; }
  .wrap { max-width:760px; margin:-32px auto 60px; padding:0 20px; }
  .card { background:#fff; border-radius:16px; padding:24px 26px; box-shadow:0 10px 30px rgba(20,40,70,.08); margin-bottom:18px; }
  .card h2 { color:var(--ink); margin:0 0 14px; font-size:19px; }
  .steps { list-style:none; padding:0; margin:0; counter-reset:s; }
  .steps li { position:relative; padding:10px 0 10px 44px; line-height:1.6; border-bottom:1px dashed #e3e9ee; }
  .steps li:last-child { border-bottom:0; }
  .steps li::before { counter-increment:s; content:counter(s); position:absolute; left:0; top:8px;
    width:28px; height:28px; border-radius:50%; background:var(--teal); color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .pill { display:inline-block; background:#eef2f6; border-radius:999px; padding:3px 10px; font-size:13px; color:#456; margin:2px 3px; }
  .note { font-size:13px; color:#6a7b8b; line-height:1.7; }
  kbd { background:#f1f4f7; border:1px solid #dde3e9; border-radius:5px; padding:1px 7px; font-size:13px; }
  a { color:#2f6d8f; }
</style>
</head>
<body>

  <script src="embed.js" data-widget="widget.html"></script>
</body>
</html>
